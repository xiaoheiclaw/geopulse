<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060810;--bg1:#0b0e1a;--bg2:#101422;--bg3:#161b2d;
  --border:#1c2240;--bHL:#2a3358;
  --t:#ccd0dc;--tD:#4a5278;--tM:#7880a0;
  --blue:#4a90ff;--blueD:#4a90ff25;
  --gold:#e0a830;--goldD:#e0a83020;
  --red:#e04848;--redD:#e0484820;
  --green:#28c868;--greenD:#28c86820;
  --purple:#9868e0;--purpleD:#9868e020;
  --cyan:#38c0d0;
}
body{font-family:'IBM Plex Mono','Noto Sans SC',monospace;background:var(--bg);color:var(--t);min-height:100vh}
/* Top bar */
.topbar{background:var(--bg1);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.topbar .left{display:flex;align-items:center;gap:10px}
.topbar .brand{font-size:12px;font-weight:800;letter-spacing:1px}
.topbar .ver{font-size:8px;color:var(--tD)}
.topbar .sep{width:1px;height:14px;background:var(--border)}
.topbar .run-id{font-size:8.5px;color:var(--tM)}
.topbar .right{font-size:8px;color:var(--tD)}
/* Tags */
.tag{font-size:8.5px;font-weight:700;padding:1px 5px;border-radius:2px;white-space:nowrap;display:inline-block}
.tag-blue{color:var(--blue);background:var(--blueD)}
.tag-gold{color:var(--gold);background:var(--goldD)}
.tag-red{color:var(--red);background:var(--redD)}
.tag-green{color:var(--green);background:var(--greenD)}
.tag-purple{color:var(--purple);background:var(--purpleD)}
.tag-dim{color:var(--tM);background:#ffffff08}
/* Regime badge */
.regime-badge{padding:2px 8px;border-radius:3px;font-size:10px;font-weight:800}
.regime-A{background:var(--blueD);border:1px solid #4a90ff44;color:var(--blue)}
.regime-B{background:var(--goldD);border:1px solid #e0a83044;color:var(--gold)}
/* Event banner */
.banner{background:#e0a83008;border-bottom:1px solid #e0a83018;padding:5px 14px;font-size:8.5px;color:var(--gold)}
/* Tabs */
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 14px;background:var(--bg1);overflow-x:auto}
.tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--tD);padding:8px 14px;font-size:9px;font-weight:400;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:all .2s;white-space:nowrap}
.tab-btn.active{background:var(--bg);border-bottom-color:var(--gold);color:var(--t);font-weight:700}
.tab-btn:hover{color:var(--tM)}
.tab-btn .icon{margin-right:4px;opacity:.5}
/* Content */
.content{padding:12px 14px;max-width:1000px}
.panel{display:none}.panel.active{display:block}
/* Cards */
.card{background:var(--bg2);border-radius:6px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border)}
.card-title{font-size:12px;font-weight:800;color:var(--t);margin-bottom:10px}
.card-l{border-left:3px solid;padding-left:11px}
/* Bar */
.bar{height:4px;background:#ffffff08;border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle}
.bar-fill{height:100%;border-radius:2px}
/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* Item row */
.item-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:4px 6px;background:var(--bg1);border-radius:4px}
/* Filter buttons */
.filter-bar{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.filter-btn{background:transparent;border:1px solid var(--border);color:var(--tD);border-radius:3px;padding:2px 8px;font-size:8px;cursor:pointer;font-family:inherit;transition:all .2s}
.filter-btn.active{background:#4a90ff15;border-color:var(--blue);color:var(--blue)}
/* Evidence card */
.ev-card{background:var(--bg2);border-radius:5px;padding:8px 10px;margin-bottom:5px;border-left:3px solid}
.ev-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ev-content{font-size:9px;color:var(--tM);line-height:1.5;margin-bottom:4px}
.ev-tags{display:flex;gap:3px;flex-wrap:wrap}
/* Scenario card */
.sc-card{background:var(--bg2);border-radius:6px;padding:10px 12px;cursor:pointer;border-left:4px solid;margin-bottom:6px;border:1px solid var(--border);transition:border-color .2s}
.sc-card.expanded{border-color:#e0a83044}
.sc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.sc-weight{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
.sc-delta{font-size:11px;font-weight:600}
.sc-detail{margin-top:10px;font-size:9px;line-height:1.7}
/* Engine */
.mech-card{background:var(--bg2);border-radius:5px;padding:8px 10px;margin-bottom:5px;border-left:3px solid var(--blue)}
.strat-card{background:var(--bg2);border-radius:5px;padding:8px 10px;margin-bottom:5px;border-left:3px solid var(--gold);cursor:pointer}
.strat-card.expanded{border:1px solid #e0a83033}
.eq-grid{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.eq-box{padding:3px 7px;border-radius:3px;border:1px solid var(--border)}
.eq-box.focal{background:var(--goldD);border-color:#e0a83044}
.hybrid-card{background:var(--bg2);border-radius:5px;padding:8px 10px;margin-bottom:5px;border-left:3px solid var(--red)}
.hybrid-flow{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.hybrid-val{text-align:center}
.hybrid-val .label{font-size:7.5px;margin-bottom:2px}
.hybrid-val .num{font-size:16px;font-weight:800}
/* Horizon */
.hz-card{background:var(--bg2);border-radius:6px;padding:12px 14px;margin-bottom:8px;border-left:4px solid}
.hz-thesis{font-size:12px;font-weight:700;line-height:1.4;margin-bottom:6px}
.hz-asset{font-size:10px;color:var(--green);padding:4px 8px;background:var(--greenD);border-radius:4px;margin-bottom:8px}
.hz-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:9px;line-height:1.5}
.hz-kill{margin-top:8px;padding:5px 8px;background:var(--redD);border-radius:4px;font-size:9px}
/* Position */
.pos-card{background:var(--bg2);border-radius:5px;padding:8px 10px;margin-bottom:5px;border-left:4px solid}
.pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:9px}
/* Trigger */
.trig-card{background:var(--bg2);border-radius:5px;padding:8px 10px;margin-bottom:4px;border-left:3px solid}
/* Invalidation */
.inv-card{background:var(--bg2);border-radius:4px;padding:6px 8px;margin-bottom:4px;border-left:3px solid}
/* Model card */
.model-card{background:var(--bg2);border-radius:5px;padding:8px 10px;margin-bottom:4px;border-left:3px solid;cursor:pointer}
.model-detail{margin-top:6px;font-size:9px;color:var(--tM);line-height:1.7;padding:6px 8px;background:var(--bg1);border-radius:4px}
/* Divergence */
.div-card{background:var(--bg2);border-radius:5px;padding:10px 12px;border-left:3px solid var(--gold);margin-bottom:6px}
.div-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:9px;line-height:1.6;margin:6px 0}
.div-side{padding:5px 7px;border-radius:4px}
/* SHS */
.shs-card{background:var(--bg2);border-radius:4px;padding:6px 8px;margin-bottom:4px;border-left:3px solid var(--purple)}
@media(max-width:700px){.g2,.hz-grid,.pos-grid,.div-grid{grid-template-columns:1fr}}
</style>
</head>

            ${tag(typeI[p.type]||p.type,lv===1?'tag-green':lv===3?'tag-red':'tag-gold')}
            <span style="font-size:10px;font-weight:700">${p.payload&&p.payload.label?p.payload.label:p.target}</span>
          </div>
          <div style="display:flex;gap:4px">
            ${tag(p.status||'pending',p.status==='applied'?'tag-green':p.status==='rejected'?'tag-red':'tag-gold')}
            ${tag(p.urgency||'next_run','tag-dim')}
          </div>
        </div>
        ${p.justification?`<div style="font-size:8.5px;color:var(--tM);line-height:1.5;margin-bottom:4px">${p.justification}</div>`:''}
        <div style="display:flex;gap:8px;font-size:8px;color:var(--tD)">
          ${p.source_model?`<span>模型: ${p.source_model}</span>`:''}
          ${p.impact_assessment?`<span>影响: ${(p.impact_assessment.affected_nodes||[]).length} nodes${p.impact_assessment.regime_impact?' <span style="color:var(--red)">⚠ Regime</span>':''}</span>`:''}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  return html;
}

function render(){
  const panels={overview:overviewTab,l2:scenariosTab,engine:engineTab,l4:horizonTab,l5:executionTab,audit:auditTab};
  let html=renderTopbar()+renderTabs();
  html+=`<div class="content">`;
  Object.keys(panels).forEach(k=>{
    html+=`<div class="panel ${st.tab===k?'active':''}">${panels[k]()}</div>`;
  });
  html+=`</div>`;
  document.getElementById('app').innerHTML=html;
}

render();
</script>
</body>
</html>
